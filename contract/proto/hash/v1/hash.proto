syntax = "proto3";

package io.github.claudineyns.redis.grpc.v1;

option java_multiple_files = true;

option java_outer_classname = "HashProto";

option java_package = "io.github.claudineyns.redis.grpc.v1";

message FieldValue {
  string field = 1;

  bytes value = 2;
}

message HSetRequest {
  string key = 1;

  repeated FieldValue fields = 2;
}

message HGetRequest {
  string key = 1;

  string field = 2;
}

message HDelRequest {
  string key = 1;

  repeated string fields = 2;
}

message HExistsRequest {
  string key = 1;

  string field = 2;
}

message HLenRequest {
  string key = 1;
}

message HMGetRequest {
  string key = 1;

  repeated string fields = 2;
}

message HGetAllRequest {
  string key = 1;
}

message HKeysRequest {
  string key = 1;
}

message HValsRequest {
  string key = 1;
}

message HashCount {
  int64 count = 1;
}

message HashValue {
  optional bytes value = 1;
}

message HashExists {
  bool exists = 1;
}

message HMGetResponse {
  repeated HashValue values = 1;
}

message HashEntries {
  repeated FieldValue entries = 1;
}

message HashFields {
  repeated string fields = 1;
}

message HashValues {
  repeated bytes values = 1;
}

message HSetNxRequest {
  string key = 1;

  string field = 2;

  bytes value = 3;
}

message HIncrByRequest {
  string key = 1;

  string field = 2;

  int64 increment = 3;
}

message HashChange {
  bool applied = 1;
}

message HashCounter {
  int64 value = 1;
}

message HScanRequest {
  string key = 1;

  string cursor = 2;

  optional string match = 3;

  optional int64 count = 4;
}

message HScanResponse {
  string cursor = 1;

  repeated FieldValue entries = 2;
}

service HashService {
  rpc HSet ( HSetRequest ) returns ( HashCount );

  rpc HGet ( HGetRequest ) returns ( HashValue );

  rpc HDel ( HDelRequest ) returns ( HashCount );

  rpc HExists ( HExistsRequest ) returns ( HashExists );

  rpc HLen ( HLenRequest ) returns ( HashCount );

  rpc HMGet ( HMGetRequest ) returns ( HMGetResponse );

  rpc HGetAll ( HGetAllRequest ) returns ( HashEntries );

  rpc HKeys ( HKeysRequest ) returns ( HashFields );

  rpc HVals ( HValsRequest ) returns ( HashValues );

  rpc HSetNx ( HSetNxRequest ) returns ( HashChange );

  rpc HIncrBy ( HIncrByRequest ) returns ( HashCounter );

  rpc HScan ( HScanRequest ) returns ( HScanResponse );
}
