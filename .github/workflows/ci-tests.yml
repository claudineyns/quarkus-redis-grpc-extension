name: ci-tests

on:
  # Roda o build em todo PR que mira a main: é o status check que protege o merge.
  pull_request:
    branches:
      - main
  # E também após integrar na main (valida o estado integrado).
  push:
    branches:
      - main

# Cancela execuções obsoletas do mesmo PR/branch quando chega novo commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # 'verify' = build completo + testes unit/mock + IT em JVM-mode (failsafe).
      # Os live tests são env-gated e pulam sem credenciais.
      - name: Build
        run: mvn -B -ntp clean verify
